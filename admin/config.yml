backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "menu"
    label: "Menu du Restaurant"
    folder: "data"
    extension: "json"
    create: false
    files:
      - file: "data/menu.json"
        label: "Les Plats"
        name: "plats"
        fields:
          - label: "Plats"
            name: "plats"
            widget: "list"
            fields:
              - {label: "Nom du plat", name: "nom", widget: "string"}
              - {label: "Prix", name: "prix", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Photo", name: "image", widget: "image"}
